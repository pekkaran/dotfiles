monitor.alsa.rules = [
  {
    matches = [
      {
        node.name = "~alsa_output.usb-0b0e_Jabra_SPEAK_510.*"
      }
      {
        node.name = "~alsa_input.usb-0b0e_Jabra_SPEAK_510.*"
      }
    ]
    actions = {
      update-props = {
        api.alsa.period-size   = 1024
        api.alsa.headroom      = 8192
        session.suspend-timeout-seconds = 0
      }
    }
  }
]
